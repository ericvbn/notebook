<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>笔记软件</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.45/dist/katex.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 侧边栏 -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title" id="sidebar-title">笔记</div>
      <button class="toggle-sidebar" id="toggle-sidebar">≡</button>
    </div>
    <div class="note-list" id="note-list">
      <!-- 笔记列表将通过 JavaScript 动态生成 -->
    </div>
  </div>

  <!-- 主内容区 -->
  <div class="main-content">
    <!-- 标签页 -->
    <div class="tabs" id="tabs">
      <!-- 标签页将通过 JavaScript 动态生成 -->
    </div>

    <!-- 编辑区 -->
    <div class="editor-container" id="editor-container">
      <!-- 欢迎框 -->
      <div class="welcome-box hidden" id="welcome-box">
        <div class="welcome-icon">📝</div>
        <div class="welcome-title">笔记软件</div>
        <div class="welcome-subtitle">简单、高效、专注的笔记管理</div>
        <div class="welcome-buttons">
          <button class="welcome-button primary" id="welcome-new-note">
            📄 新建笔记
          </button>
          <button class="welcome-button secondary" id="welcome-open-file">
            📂 打开文件
          </button>
          <button class="welcome-button secondary" id="welcome-open-folder">
            📁 打开文件夹
          </button>
        </div>
      </div>
      <!-- 编辑器和预览区 -->
      <div id="editor-preview-container" style="display: flex; flex: 1;">
        <textarea class="editor" id="editor" placeholder="开始编写笔记..."></textarea>
        <div class="preview" id="preview"></div>
      </div>
    </div>
    <!-- 标签栏 -->
    <div class="tag-bar" id="tag-bar"></div>
  </div>

  <!-- 右键菜单 -->
  <div class="context-menu" id="context-menu">
    <div class="context-menu-item" id="delete-note">删除笔记</div>
  </div>

  <!-- 合成按钮 -->
  <button class="compose-button" id="compose-button" title="合成笔记">+</button>

  <!-- 保存确认模态框 -->
  <div id="save-confirm-modal" class="modal">
    <div class="modal-content">
      <h3>保存笔记</h3>
      <p>是否保存对笔记的修改？</p>
      <div class="modal-buttons">
        <button id="save-confirm-yes">保存</button>
        <button id="save-confirm-no">不保存</button>
        <button id="save-confirm-cancel">取消</button>
      </div>
    </div>
  </div>

  <!-- 标签输入模态框 -->
  <div id="tag-modal" class="modal">
    <div class="modal-content">
      <h3>添加标签</h3>
      <input type="text" id="tag-input" placeholder="请输入标签名称">
      <div class="modal-buttons">
        <button id="tag-confirm">确定</button>
        <button id="tag-cancel">取消</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.45/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.45/dist/contrib/auto-render.min.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
